# =============================================================================
# STAGE: DEPLOY - Cloudflare Workers Deployment
# =============================================================================
# Note: Deploy only on main branch pushes. MRs skip deploy.
# Production deployment authority is Cloudflare Workers Builds for git pushes.
# This job provides an alternative GitLab-native deployment path.
# =============================================================================
deploy:
  stage: deploy
  needs: ['build']
  environment:
    name: production
    url: https://resume.jclee.me
  before_script:
    - source .gitlab/job_vars.env 2>/dev/null || true
    - apk add --no-cache go
    - npm ci --cache .npm --prefer-offline 2>&1 | tail -3
  script: |
    set -euo pipefail
    echo "🚀 Deploying to Cloudflare Workers..."

    # Check for API Token (preferred) or API Key + Email (legacy)
    if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
      echo "✓ Using CLOUDFLARE_API_TOKEN for authentication"
    elif [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
      echo "✓ Using CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL for authentication"
    else
      echo "❌ Cloudflare credentials not set."
      echo "   Set either:"
      echo "   - CLOUDFLARE_API_TOKEN (preferred), or"
      echo "   - CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL (legacy)"
      exit 1
    fi

    if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
      echo "❌ CLOUDFLARE_ACCOUNT_ID is not set. Skipping deploy."
      exit 1
    fi

    echo "📦 Build artifact available: $(ls -lh apps/portfolio/worker.js 2>/dev/null || echo 'not found locally')"

    echo "🔐 Deploying via wrangler..."
    npx wrangler deploy \
      --config apps/portfolio/wrangler.toml \
      --env production \
      2>&1 | tail -20

    DEPLOY_STATUS=${PIPESTATUS[0]}
    if [ $DEPLOY_STATUS -eq 0 ]; then
      echo "✅ Deployment complete!"
    else
      echo "❌ Deployment failed with exit code $DEPLOY_STATUS"
      exit $DEPLOY_STATUS
    fi
    echo ""
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
  allow_failure: true # wrangler deploy is optional; CF Builds is primary path
