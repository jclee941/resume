# =============================================================================
# STAGE: VALIDATE - Type Checking
# =============================================================================
typecheck:
  stage: validate
  needs: ["analyze"]
  interruptible: true
  before_script:
    - source .gitlab/job_vars.env 2>/dev/null || true
  script: |
    set -euo pipefail
    echo "🔍 Running TypeScript check..."
    npm ci --cache .npm --prefer-offline 2>&1 | tail -5
    npm run typecheck
    echo "✅ TypeScript check passed"
