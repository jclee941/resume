# =============================================================================
# STAGE: VERIFY - Security Headers
# =============================================================================
verify-security-headers:
  stage: verify
  needs: ["deploy"]
  interruptible: true
  before_script:
    - apk add --no-cache curl bash jq
  script: |
    set -euo pipefail
    
    PORTFOLIO_URL="${PORTFOLIO_URL:-https://resume.jclee.me}"
    TIMEOUT="${VERIFY_TIMEOUT:-30}"
    UA='Mozilla/5.0 (GitLabCI VerifyDeployment; +https://gitlab.jclee.me)'
    
    echo "🔒 Checking Security Headers..."
    HEADERS=$(curl -fsSIL --http1.1 --connect-timeout 10 --retry 3 --retry-delay 2 \
      -A "$UA" "$PORTFOLIO_URL/" 2>/dev/null) || true
    
    # CSP
    if echo "$HEADERS" | grep -qi "content-security-policy"; then
      echo "✅ CSP: Present"
    else
      echo "⚠️  CSP: Missing (non-blocking)"
    fi
    
    # X-Content-Type-Options (blocking)
    HEADERS_XCTO=$(curl -sI --max-time "$TIMEOUT" "$PORTFOLIO_URL/" 2>/dev/null) || true
    if echo "$HEADERS_XCTO" | grep -qi "x-content-type-options.*nosniff"; then
      echo "✅ X-Content-Type-Options: nosniff"
    else
      echo "❌ X-Content-Type-Options: Missing or incorrect"
      exit 1
    fi
    
    echo "✅ Security headers verification complete"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_COMMIT_BRANCH == "master"'
      when: always
