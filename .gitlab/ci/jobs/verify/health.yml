# =============================================================================
# STAGE: VERIFY - Health Check
# =============================================================================
verify-health:
  stage: verify
  needs: ["deploy"]
  interruptible: true
  before_script:
    - apk add --no-cache curl bash jq
  script: |
    set -euo pipefail
    
    PORTFOLIO_URL="${PORTFOLIO_URL:-https://resume.jclee.me}"
    TIMEOUT="${VERIFY_TIMEOUT:-30}"
    RETRIES=5
    DELAY=5
    UA='Mozilla/5.0 (GitLabCI VerifyDeployment; +https://gitlab.jclee.me)'
    
    echo "🏥 Checking Portfolio Health..."
    
    for i in $(seq 1 $RETRIES); do
      echo "  Attempt $i/$RETRIES..."
      HEALTH=$(curl -fsSL --http1.1 --connect-timeout 10 --retry 3 --retry-delay 2 \
        -A "$UA" -H 'Accept: application/json' \
        "$PORTFOLIO_URL/health" 2>/dev/null) || true
      
      if [ -n "$HEALTH" ]; then
        STATUS=$(echo "$HEALTH" | jq -r '.status // "unknown"' 2>/dev/null)
        VERSION=$(echo "$HEALTH" | jq -r '.version // "unknown"' 2>/dev/null)
        DEPLOYED_AT=$(echo "$HEALTH" | jq -r '.deployed_at // "unknown"' 2>/dev/null)
        
        if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
          echo "✅ Portfolio Health: $STATUS (v$VERSION, deployed: ${DEPLOYED_AT:0:19})"
          exit 0
        fi
      fi
      
      if [ $i -lt $RETRIES ]; then
        echo "  Retrying in ${DELAY}s..."
        sleep $DELAY
      fi
    done
    
    echo "⚠️  Portfolio Health: Endpoint unreachable after $RETRIES attempts (non-blocking)"
    exit 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_COMMIT_BRANCH == "master"'
      when: always
