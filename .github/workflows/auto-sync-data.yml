name: Auto-sync SSoT Data

# Scheduled sync of packages/data/ (single source of truth) into the
# apps/portfolio/ snapshot files (data.json, data_en.json, data_ja.json).
# Opens a PR when there are real diffs so a human can review before merge.
#
# Ported from .gitlab-legacy/ci/auto-sync.yml (auto-sync-data job).
# auto-update-deps was NOT ported — Dependabot handles that better.

on:
  schedule:
    # Daily at 00:00 UTC (09:00 KST). Keeps portfolio data fresh with
    # upstream resume edits without requiring manual intervention.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Open PR even when no diffs are detected (smoke test)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: auto-sync-data
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  sync:
    name: Sync resume data and open PR if drifted
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Go (for validate-cloudflare-native.go)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run SSoT sync
        run: npm run sync:data

      - name: Detect drift
        id: drift
        run: |
          set -euo pipefail
          if git diff --quiet apps/portfolio/data.json apps/portfolio/data_en.json apps/portfolio/data_ja.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No data drift detected between SSoT and portfolio snapshots"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Data drift detected — will open PR"
            git diff --stat apps/portfolio/data.json apps/portfolio/data_en.json apps/portfolio/data_ja.json
          fi

      - name: Run full SSoT automation (when drifted)
        if: steps.drift.outputs.has_changes == 'true' || github.event.inputs.force_pr == 'true'
        run: npm run automate:ssot

      - name: Validate Cloudflare Workers config
        if: steps.drift.outputs.has_changes == 'true' || github.event.inputs.force_pr == 'true'
        run: |
          if [ -f tools/ci/validate-cloudflare-native.go ]; then
            go run ./tools/ci/validate-cloudflare-native.go
          else
            echo "::warning::tools/ci/validate-cloudflare-native.go not found — skipping CF validation"
          fi

      - name: Discard worker.js changes
        if: steps.drift.outputs.has_changes == 'true' || github.event.inputs.force_pr == 'true'
        # worker.js is generated; it will be rebuilt by Cloudflare Workers Builds
        # on the PR branch. Don't include it in the sync PR.
        run: |
          if [ -f apps/portfolio/worker.js ]; then
            git checkout HEAD -- apps/portfolio/worker.js || true
          fi

      - name: Create Pull Request
        if: steps.drift.outputs.has_changes == 'true' || github.event.inputs.force_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(data): sync resume data from SSoT'
          title: 'chore(data): sync resume data from SSoT'
          body: |
            ## Summary

            Automated resume data sync from SSoT (`packages/data/`) to portfolio snapshots (`apps/portfolio/data*.json`).

            ### Verification performed by the workflow
            - [x] `npm run sync:data`
            - [x] `npm run automate:ssot`
            - [x] `go run ./tools/ci/validate-cloudflare-native.go`
            - [x] `apps/portfolio/worker.js` changes discarded (CF Workers Builds regenerates it)

            ### Review checklist
            - [ ] Data changes look intentional (no accidental deletions)
            - [ ] Translations (en/ja) stay consistent with master (ko)
            - [ ] No secrets or internal IDs leaked into the data files

            ---
            *Auto-generated by `.github/workflows/auto-sync-data.yml`*
          branch: chore/auto-sync-data
          delete-branch: true
          labels: |
            automated
            data-sync
          base: master

      - name: Summary
        if: always()
        run: |
          {
            echo "## Auto-sync Summary"
            echo ""
            echo "- **Drift detected**: ${{ steps.drift.outputs.has_changes }}"
            echo "- **Force PR**: ${{ github.event.inputs.force_pr || 'false' }}"
            echo "- **Trigger**: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
