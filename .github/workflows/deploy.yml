name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'apps/portfolio/**'
      - 'packages/data/resumes/master/**'
      - 'packages/shared/**'
      - 'tools/scripts/sync-data.mjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip_verify:
        description: 'Skip post-deploy health verification'
        required: false
        default: 'false'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    name: Build & Deploy Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://resume.jclee.me
    outputs:
      deploy-id: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Sync SSoT data
        run: npm run sync:data

      - name: Build portfolio worker
        run: npm run build

      - name: Verify worker.js artifact
        run: |
          set -euo pipefail
          test -f apps/portfolio/worker.js
          SIZE=$(stat -c %s apps/portfolio/worker.js)
          echo "worker.js size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ worker.js suspiciously small"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portfolio
          command: deploy --env production

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://resume.jclee.me" >> $GITHUB_STEP_SUMMARY

  verify-health:
    name: Verify Production Health
    runs-on: ubuntu-latest
    needs: build-and-deploy
    timeout-minutes: 5
    if: ${{ github.event.inputs.skip_verify != 'true' }}
    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check /health endpoint
        run: |
          set -euo pipefail
          PORTFOLIO_URL="https://resume.jclee.me"
          RETRIES=5
          DELAY=5

          for i in $(seq 1 $RETRIES); do
            echo "Attempt $i/$RETRIES..."
            HEALTH=$(curl -fsSL --http1.1 --connect-timeout 10 --retry 3 --retry-delay 2 \
              -H 'Accept: application/json' \
              "$PORTFOLIO_URL/health" 2>/dev/null) || true

            if [ -n "$HEALTH" ]; then
              STATUS=$(echo "$HEALTH" | jq -r '.status // "unknown"')
              VERSION=$(echo "$HEALTH" | jq -r '.version // "unknown"')
              DEPLOYED_AT=$(echo "$HEALTH" | jq -r '.deployed_at // "unknown"')

              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
                echo "✅ Portfolio Health: $STATUS"
                echo "   Version: $VERSION"
                echo "   Deployed: $DEPLOYED_AT"
                echo "## Health Check ✅" >> $GITHUB_STEP_SUMMARY
                echo "- Status: $STATUS" >> $GITHUB_STEP_SUMMARY
                echo "- Version: $VERSION" >> $GITHUB_STEP_SUMMARY
                echo "- Deployed At: $DEPLOYED_AT" >> $GITHUB_STEP_SUMMARY
                exit 0
              fi
            fi

            if [ $i -lt $RETRIES ]; then
              echo "  Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done

          echo "❌ Portfolio Health: Endpoint unreachable after $RETRIES attempts"
          exit 1

      - name: Verify new content deployed
        run: |
          set -euo pipefail
          HTML=$(curl -sSf --connect-timeout 10 https://resume.jclee.me/)

          # Expected markers from recent content updates
          SEEKING_COUNT=$(echo "$HTML" | grep -c '구직 중' || true)
          VELOG_COUNT=$(echo "$HTML" | grep -c 'velog.io' || true)
          JCLEE_COUNT=$(echo "$HTML" | grep -c 'jclee941' || true)

          echo "구직 중: $SEEKING_COUNT occurrences"
          echo "velog.io: $VELOG_COUNT occurrences"
          echo "jclee941: $JCLEE_COUNT occurrences"

          if [ "$SEEKING_COUNT" -lt 1 ] || [ "$VELOG_COUNT" -lt 1 ] || [ "$JCLEE_COUNT" -lt 1 ]; then
            echo "⚠️  Some expected content markers missing (non-blocking)"
          else
            echo "✅ All expected content markers present"
          fi
