# =============================================================================
# RESUME MONOREPO - GitLab CI/CD PIPELINE
# Mirrors: .github/workflows/ci.yml + .github/workflows/verify.yml
# =============================================================================
# CI is validation-only. Production deployment authority is Cloudflare Workers
# Builds (git push to protected branch). This pipeline adds GitLab-native
# deploy capability as an alternative path.
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   CLOUDFLARE_API_TOKEN      - Cloudflare API token (masked)
#   CLOUDFLARE_ACCOUNT_ID     - Cloudflare account ID
#   OP_SERVICE_ACCOUNT_TOKEN   - 1Password service account (optional)
#   TELEGRAM_BOT_TOKEN        - Telegram notifications (optional)
#   TELEGRAM_CHAT_ID          - Telegram chat ID (optional)
#
# Optional GitLab OAuth Variables:
#   GITLAB_URL                - GitLab instance URL (default: http://gitlab.jclee.me)
#   GITLAB_OAUTH_APP_ID       - OAuth application ID
#   GITLAB_OAUTH_CLIENT_SECRET - OAuth client secret
# =============================================================================
#
# Include additional CI configurations
include:
  # External includes
  - local: '.gitlab/ci/onepassword.yml'
  - local: '.gitlab/ci/notifications.yml'
  - local: '.gitlab/ci/n8n-notifications.yml'
  - local: '.gitlab/ci/verify.yml'
  - local: '.gitlab/ci/release.yml'
  - local: '.gitlab/ci/auto-sync.yml'
  - local: '.gitlab/ci/auto-issue-on-failure.yml'
  - local: '.gitlab/ci/wanted-resume-sync.yml'
  # Job definitions
  - local: '.gitlab/ci/jobs/analyze.yml'
  - local: '.gitlab/ci/jobs/validate/cloudflare.yml'
  - local: '.gitlab/ci/jobs/validate/lint.yml'
  - local: '.gitlab/ci/jobs/validate/typecheck.yml'
  - local: '.gitlab/ci/jobs/validate/data-drift.yml'
  - local: '.gitlab/ci/jobs/test/unit.yml'
  - local: '.gitlab/ci/jobs/test/e2e.yml'
  - local: '.gitlab/ci/jobs/security.yml'
  - local: '.gitlab/ci/jobs/build.yml'
  - local: '.gitlab/ci/jobs/deploy.yml'
#
image: node:22-alpine
#
stages:
  - analyze
  - validate
  - test
  - security
  - build
  - deploy
  - verify
  - report
  - automation
