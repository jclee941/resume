name = "resume"
main = "entry.js"
compatibility_date = "2026-02-21"
compatibility_flags = ["nodejs_compat"]
# account_id sourced from CLOUDFLARE_ACCOUNT_ID env var or wrangler-action accountId

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[assets]
directory = "./assets"
binding = "ASSETS"

[env.preview]
name = "resume-preview"
vars = { ENVIRONMENT = "preview", ELASTICSEARCH_INDEX = "resume-logs-worker-preview" }

[env.preview.assets]
directory = "./assets"
binding = "ASSETS"

[env.production]
name = "resume"
vars = { ENVIRONMENT = "production", ELASTICSEARCH_INDEX = "resume-logs-worker" }
routes = [{ pattern = "resume.jclee.me", custom_domain = true }]

[env.production.assets]
directory = "./assets"
binding = "ASSETS"

# Portfolio D1 Database
[[env.production.d1_databases]]
binding = "DB"
database_name = "resume-prod-db"
database_id = "6c723024-2527-490d-8ffd-38604b923166"

# KV Namespaces
[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "2b81b9b02dc34f518d2ca9552804bfef"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "fe51b0f1c2c44841b4895e8747cb408a"

[[env.production.kv_namespaces]]
binding = "NONCE_KV"
id = "3e282b1b906c474aadcc947a06f0c1ad"

# Service Binding to job-dashboard worker (MSA: /job/* proxy)
[[env.production.services]]
binding = "JOB_SERVICE"
service = "job"
