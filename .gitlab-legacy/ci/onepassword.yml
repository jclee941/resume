# =============================================================================
# 1Password CLI Integration for GitLab CI/CD
# =============================================================================
# Replaces GitHub Action: 1password/load-secrets-action
# Used by: terraform, release, maintenance, wanted-resume-sync workflows
# Vault: homelab
# =============================================================================

.op-secrets:
  before_script:
    - |
      # Install 1Password CLI if not present
      if ! command -v op &>/dev/null; then
        curl -sSfo op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.30.0/op_linux_amd64_v2.30.0.zip"
        unzip -od /usr/local/bin op.zip && rm op.zip
        chmod +x /usr/local/bin/op
      fi
    - |
      # Authenticate with service account token
      if [ -n "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
        export OP_CLI_TOKEN=$(op signin --raw)
        echo "1Password CLI authenticated"
      else
        echo "WARNING: OP_SERVICE_ACCOUNT_TOKEN not set"
        exit 1
      fi