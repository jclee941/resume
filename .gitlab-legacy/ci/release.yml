# =============================================================================
# RELEASE PIPELINE - GitLab CI
# Migrated from .github/workflows/release.yml
# Refactored to stay under 150 LOC (ELK ingest moved to separate file)
# =============================================================================
# Trigger: master push (after CI passes) or manual web dispatch.
# Requires CI variable GITLAB_TOKEN with api + write_repository scope.
#
# Stages used:
#   deploy  – create semver tag + GitLab Release
#   report  – ELK ingest (defined in release-elk-ingest.yml)
# =============================================================================

.release-rules: &release-rules
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

release:
  stage: deploy
  image: node:22-bookworm
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends git jq curl ca-certificates
    - git config user.email "ci-release@gitlab.local"
    - git config user.name "GitLab CI Release"
    - git remote set-url origin
        "https://gitlab-ci-token:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      set -euo pipefail

      # Determine last semver tag
      LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "v0.0.0")
      echo "Last tag: ${LAST_TAG}"

      VERSION="${LAST_TAG#v}"
      MAJOR=$(echo "$VERSION" | cut -d. -f1)
      MINOR=$(echo "$VERSION" | cut -d. -f2)
      PATCH=$(echo "$VERSION" | cut -d. -f3)

      # Parse conventional commits to determine bump type
      COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b" 2>/dev/null || \
                git log --pretty=format:"%s%n%b")

      if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
        echo "No commits since ${LAST_TAG}; skipping release."
        echo "RELEASE_TAG=${LAST_TAG}" >> release.env
        echo "RELEASE_CONCLUSION=skipped" >> release.env
        exit 0
      fi

      BUMP="patch"
      if echo "$COMMITS" | grep -qiE '(BREAKING[[:space:]]CHANGE|^[a-z]+(\([^)]*\))?!:)'; then
        BUMP="major"
      elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?(!)?:'; then
        BUMP="minor"
      fi
      echo "Bump type: ${BUMP}"

      # Calculate new version
      case "$BUMP" in
        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch) PATCH=$((PATCH + 1)) ;;
      esac

      NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
      echo "New tag: ${NEW_TAG}"

      # Generate changelog
      CHANGELOG_BODY=$(git log "${LAST_TAG}..HEAD" \
        --pretty=format:"- %s (%h)" 2>/dev/null || git log --pretty=format:"- %s (%h)")

      CHANGELOG_DATE=$(date -u +%Y-%m-%d)
      {
        echo "## ${NEW_TAG} (${CHANGELOG_DATE})"
        echo ""
        echo "${CHANGELOG_BODY}"
      } > CHANGELOG.md

      echo "=== Changelog ==="
      cat CHANGELOG.md

      # Create and push annotated git tag
      git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}" "${CI_COMMIT_SHA}"
      git push origin "${NEW_TAG}"
      echo "Pushed tag ${NEW_TAG}"

      # Create GitLab Release via API
      DESCRIPTION=$(cat CHANGELOG.md | jq -Rs .)

      HTTP_CODE=$(curl -s -o /tmp/release-response.json -w "%{http_code}" \
        -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
        -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{
          \"name\": \"Release ${NEW_TAG}\",
          \"tag_name\": \"${NEW_TAG}\",
          \"description\": ${DESCRIPTION},
          \"ref\": \"${CI_COMMIT_SHA}\"
        }")

      echo "GitLab Releases API HTTP ${HTTP_CODE}"
      cat /tmp/release-response.json

      if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
        echo "Release creation failed (HTTP ${HTTP_CODE})"
        exit 1
      fi

      echo "Release ${NEW_TAG} created"

      echo "RELEASE_TAG=${NEW_TAG}" >> release.env
      echo "RELEASE_CONCLUSION=success" >> release.env
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - CHANGELOG.md
      - release.env
    expire_in: 30 days
  <<: *release-rules

include:
  - local: '.gitlab/ci/release-elk-ingest.yml'
