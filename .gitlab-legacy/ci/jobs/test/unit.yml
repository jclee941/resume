# =============================================================================
# STAGE: TEST - Unit Tests
# =============================================================================
test-unit:
  stage: test
  needs: ["analyze"]
  interruptible: true
  script: |
    set -euo pipefail
    echo "🧪 Running all unit tests..."
    npm ci --cache .npm --prefer-offline 2>&1 | tail -5
    npm test
    echo "📊 Generating coverage reports..."
    npm run test:coverage
    echo "✅ Unit tests complete"
  coverage: '/(?i)total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 7 days
